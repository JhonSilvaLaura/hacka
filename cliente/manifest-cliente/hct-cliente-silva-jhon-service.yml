apiVersion: v1
kind: Service
metadata:
  name: jhon-silva-backend-service
  namespace: jhon-silva-backend
  labels:
    app: jhon-silva-backend
    tier: backend
spec:
  type: LoadBalancer
  selector:
    app: jhon-silva-backend
    tier: backend
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
  sessionAffinity: ClientIP