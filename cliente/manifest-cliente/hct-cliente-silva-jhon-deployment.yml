apiVersion: apps/v1
kind: Deployment
metadata:
  name: jhon-silva-backend-deployment
  namespace: jhon-silva-backend
  labels:
    app: jhon-silva-backend
    tier: backend
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jhon-silva-backend
      tier: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: jhon-silva-backend
        tier: backend
        version: "1.0"
    spec:
      containers:
        - name: jhon-silva-backend
          image: jhonbrayansilvalaura/jhon-silva-be:1.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: jhon-silva-backend-secrets
                  key: DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: jhon-silva-backend-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jhon-silva-backend-secrets
                  key: DB_PASSWORD
            - name: SERVER_PORT
              valueFrom:
                secretKeyRef:
                  name: jhon-silva-backend-secrets
                  key: SERVER_PORT
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/users
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/users
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always