apiVersion: v1
kind: Secret
metadata:
  name: jhon-silva-frontend-secrets
  namespace: jhon-silva-frontend
type: Opaque
data:
  # URL del backend - Valor en base64
  # IMPORTANTE: Después del deploy del backend, obtener la IP externa con:
  # kubectl get service jhon-silva-backend-service -n jhon-silva-backend
  # Luego convertir la URL completa a base64:
  # powershell -Command "[Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes('http://TU-IP-EXTERNA:8080'))"
  # y reemplazar el valor abajo

  # Valor actual: http://localhost:30080 (NodePort automático)
  API_URL: aHR0cDovL2xvY2FsaG9zdDozMDA4MA==
