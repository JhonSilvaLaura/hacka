apiVersion: apps/v1
kind: Deployment
metadata:
  name: jhon-silva-frontend-deployment
  namespace: jhon-silva-frontend
  labels:
    app: jhon-silva-frontend
    tier: frontend
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jhon-silva-frontend
      tier: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: jhon-silva-frontend
        tier: frontend
        version: "1.0"
    spec:
      containers:
      - name: jhon-silva-frontend
        image: jhonbrayansilvalaura/jhon-silva-fe:1.0
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      restartPolicy: Always
